<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~/miroshan</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

* { font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
.emoji { font-family: "Apple Color Emoji", "Segoe UI Emoji", sans-serif; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="dark"] {
  --bg: #090912;
  --surface: #0F0F1C;
  --border: #1C1C30;
  --primary: #7BA7FF;
  --text: #E2E8F0;
  --muted: #3A3A55;
  --muted2: #5A6080;
  --tg: #2AABEE;
  --gh: #B0BAC9;
  --dc: #7289DA;
  --topbar: rgba(9,9,18,.88);
  --cursor: #ffffff;
}
[data-theme="light"] {
  --bg: #F4F6FF;
  --surface: #FFFFFF;
  --border: #E0E6F8;
  --primary: #3B6FD4;
  --text: #1A1C2E;
  --muted: #C0CAE0;
  --muted2: #64748B;
  --tg: #0088cc;
  --gh: #24292F;
  --dc: #4752C4;
  --topbar: rgba(244,246,255,.9);
  --cursor: #1A1C2E;
}

html, body { height: 100%; cursor: none; }
body {
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column; min-height: 100vh;
  transition: background .4s, color .4s; overflow-x: hidden;
}


.cursor-dot {
  position: fixed; width: 9px; height: 9px;
  background: var(--cursor); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: transform .1s, opacity .15s, background .4s;
  box-shadow: 0 0 10px rgba(255,255,255,.3);
}
[data-theme="light"] .cursor-dot { box-shadow: 0 0 8px rgba(0,0,0,.15); }
.cursor-dot.click { transform: translate(-50%,-50%) scale(.5); }
.cursor-dot.hover { transform: translate(-50%,-50%) scale(2); opacity: .45; }
@media(hover:none){ .cursor-dot{display:none;} html,body{cursor:auto;} }


.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(110px); animation: orbFloat 14s ease-in-out infinite; }
.orb-1 { width: 520px; height: 520px; background: radial-gradient(circle,rgba(80,120,255,.2),transparent 70%); top:-140px; right:-100px; animation-delay:0s; }
.orb-2 { width: 420px; height: 420px; background: radial-gradient(circle,rgba(88,101,242,.16),transparent 70%); bottom:-100px; left:-80px; animation-delay:5s; }
.orb-3 { width: 300px; height: 300px; background: radial-gradient(circle,rgba(42,171,238,.13),transparent 70%); top:40%; left:30%; animation-delay:9s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(18px,-18px) scale(1.05);} 66%{transform:translate(-12px,14px) scale(.97);} }
[data-theme="light"] .orb-1 { background: radial-gradient(circle,rgba(80,120,255,.1),transparent 70%); }
[data-theme="light"] .orb-2 { background: radial-gradient(circle,rgba(88,101,242,.08),transparent 70%); }
[data-theme="light"] .orb-3 { background: radial-gradient(circle,rgba(42,171,238,.07),transparent 70%); }

.bg-grid {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size: 48px 48px; opacity: .5; transition: opacity .4s;
}
[data-theme="light"] .bg-grid { opacity: .6; }


.topbar {
  position: fixed; top:0; left:0; right:0; z-index:50;
  background: var(--topbar); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  height: 54px; padding: 0 18px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background .4s, border-color .4s;
}
.bar-left { display:flex; align-items:center; gap:10px; }
.bar-dots { display:flex; gap:5px; }
.dot { width:10px; height:10px; border-radius:50%; }
.dot-r{background:#FF5F57;} .dot-y{background:#FEBC2E;} .dot-g{background:#28C840;}
.bar-label { font-family:'Roboto Mono',monospace; font-size:.82rem; color:var(--muted2); }
.bar-label .nm { color:var(--primary); font-weight:500; }
.blink { display:inline-block; width:2px; height:12px; background:var(--primary); margin-left:1px; vertical-align:middle; animation:blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

.bar-right { display:flex; align-items:center; gap:2px; }
.icon-btn {
  background:none; border:none; cursor:none;
  color:var(--muted2); padding:6px 9px; border-radius:8px;
  font-size:.74rem; font-family:'Roboto Mono',monospace;
  display:flex; align-items:center; gap:4px;
  transition:color .2s,background .2s; line-height:1;
}
.icon-btn:hover { color:var(--primary); background:rgba(123,167,255,.07); }
.icon-btn svg { width:13px; height:13px; fill:currentColor; flex-shrink:0; }


main { flex:1; display:flex; align-items:center; justify-content:center; padding:70px 20px 24px; position:relative; z-index:1; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 22px; padding: 38px 34px;
  max-width: 440px; width: 100%; text-align: center;
  position: relative;
  transition: background .4s, border-color .4s, box-shadow .4s;
  box-shadow: 0 16px 50px rgba(0,0,0,.3);
}
.card::before {
  content:''; position:absolute; inset:-1px; border-radius:23px;
  background:linear-gradient(135deg,rgba(100,140,255,.22),rgba(88,101,242,.18),rgba(42,171,238,.12));
  opacity:0; transition:opacity .4s; z-index:-1;
}
.card:hover::before { opacity:1; }
[data-theme="light"] .card { box-shadow:0 8px 32px rgba(0,0,0,.08); }

.avatar {
  width:78px; height:78px; border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--dc));
  display:flex; align-items:center; justify-content:center;
  font-family:'Roboto Mono',monospace; font-size:1.75rem; font-weight:500; color:#fff;
  margin:0 auto 16px; box-shadow:0 0 24px rgba(123,167,255,.28);
  transition:box-shadow .4s;
}
.card:hover .avatar { box-shadow:0 0 40px rgba(123,167,255,.45); }


.translated { transition: opacity .35s ease, transform .35s ease; }
.translated.out { opacity:0; transform:translateY(4px); }

.greeting { font-size:1.4rem; font-weight:500; margin-bottom:6px; letter-spacing:-.01em; }
.wave { display:inline-block; animation:wave 2.5s ease-in-out infinite; font-family:"Apple Color Emoji","Segoe UI Emoji",sans-serif; }
@keyframes wave { 0%,100%{transform:rotate(0);} 30%{transform:rotate(20deg);} 60%{transform:rotate(-5deg);} }
.bio { font-size:.875rem; color:var(--muted2); line-height:1.7; margin-bottom:24px; }


.links { display:flex; flex-direction:column; gap:8px; }
.link {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; border-radius:12px;
  border:1px solid var(--border); background:var(--bg);
  text-decoration:none; color:var(--text);
  transition:transform .2s,border-color .25s,box-shadow .25s,background .25s;
  cursor:none; position:relative; overflow:hidden;
}
.link::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.03) 100%); opacity:0; transition:opacity .3s; }
.link:hover::after { opacity:1; }
.link:hover { transform:translateY(-2px); }

.link-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.link-icon svg { width:17px; height:17px; }
.link-body { text-align:left; flex:1; }
.link-title { font-size:.85rem; font-weight:500; }
.link-handle { font-family:'Roboto Mono',monospace; font-size:.7rem; color:var(--muted2); margin-top:1px; }
.link-arrow { color:var(--muted2); font-size:.9rem; opacity:0; transform:translateX(-4px); transition:opacity .2s,transform .2s; }
.link:hover .link-arrow { opacity:1; transform:none; }

.link-tg { border-color:rgba(42,171,238,.2); }
.link-tg:hover { border-color:var(--tg); box-shadow:0 0 22px rgba(42,171,238,.2),0 4px 16px rgba(0,0,0,.2); }
.link-tg .link-icon { background:rgba(42,171,238,.1); }
.link-tg .link-icon svg { fill:var(--tg); }
.link-tg .link-title { color:var(--tg); }

.link-gh { border-color:rgba(176,186,201,.15); }
.link-gh:hover { border-color:var(--gh); box-shadow:0 0 22px rgba(176,186,201,.1),0 4px 16px rgba(0,0,0,.2); }
.link-gh .link-icon { background:rgba(176,186,201,.08); }
.link-gh .link-icon svg { fill:var(--gh); }
.link-gh .link-title { color:var(--gh); }

.link-dc { border-color:rgba(114,137,218,.2); }
.link-dc:hover { border-color:var(--dc); box-shadow:0 0 22px rgba(114,137,218,.22),0 4px 16px rgba(0,0,0,.2); }
.link-dc .link-icon { background:rgba(114,137,218,.1); }
.link-dc .link-icon svg { fill:var(--dc); }
.link-dc .link-title { color:var(--dc); }


.link-tt {
  border-color:rgba(232,232,232,.06); opacity:.32;
  cursor:not-allowed; pointer-events:none; filter:grayscale(.5);
}
.link-tt .link-icon { background:rgba(232,232,232,.05); }
.link-tt .link-icon svg { fill:var(--muted2); }
.link-tt .link-title { color:var(--muted2); }
.link-tt .coming { font-family:'Roboto Mono',monospace; font-size:.6rem; color:var(--muted); margin-left:auto; letter-spacing:.05em; }


.projects-wrap { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); transition:border-color .4s; }
.link-projects {
  justify-content:center; gap:8px;
  background:linear-gradient(135deg,rgba(100,140,255,.1),rgba(88,101,242,.08));
  border-color:rgba(100,140,255,.22);
}
.link-projects:hover { border-color:var(--primary); box-shadow:0 0 28px rgba(100,140,255,.22),0 0 60px rgba(100,140,255,.07); background:linear-gradient(135deg,rgba(100,140,255,.16),rgba(88,101,242,.12)); }
.link-projects .link-title { color:var(--primary); font-size:.88rem; }
.link-projects .link-icon { background:rgba(100,140,255,.1); }
.link-projects .link-icon svg { fill:var(--primary); }
.link-projects .link-arrow { opacity:.45; transform:none; }
.link-projects:hover .link-arrow { opacity:1; }


.island-wrap {
  position: fixed; top: 54px; left: 50%; transform: translate(-50%, -50%);
  z-index: 200;
}
.island {
  background: #111118;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 999px;
  display: flex; align-items: center; gap: 0;
  padding: 0 8px;
  height: 46px;
  box-shadow: 0 2px 20px rgba(0,0,0,.5);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  cursor: none;
}
.island:hover {
  transform: scale(1.08);
  box-shadow: 0 4px 32px rgba(0,0,0,.6);
}
[data-theme="light"] .island { background: #1a1a2a; }

.island-btn {
  text-decoration: none; padding: 8px 18px; border-radius: 999px;
  font-family: 'Roboto Mono', monospace;
  font-size: .82rem; font-weight: 500;
  color: #7BA7FF;
  white-space: nowrap; cursor: none;
  transition: color .2s;
}
.island-btn:hover { color: #ffffff; }
footer {
  position:relative; z-index:1; text-align:center; padding:12px;
  font-family:'Roboto Mono',monospace; font-size:.63rem;
  color:var(--muted2); border-top:1px solid var(--border);
  transition:border-color .4s,color .4s;
}
</style>

<script>

  const dot = document.getElementById('cursorDot');
  document.addEventListener('mousemove', e => { dot.style.left = e.clientX+'px'; dot.style.top = e.clientY+'px'; });
  document.addEventListener('mousedown', () => dot.classList.add('click'));
  document.addEventListener('mouseup',   () => dot.classList.remove('click'));
  document.querySelectorAll('a,button,.island-btn').forEach(el => {
    el.addEventListener('mouseenter', () => dot.classList.add('hover'));
    el.addEventListener('mouseleave', () => dot.classList.remove('hover'));
  });
